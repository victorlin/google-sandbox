name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7
      
      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'

      - run: npm ci

      - run: npm run make

      - uses: actions/upload-artifact@v7
        with:
          name: app
          path: out/make/*.dmg
          if-no-files-found: error
